name: Train Models

on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "uv.lock"
      - "outlier_detector_training.py"
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model_type: [random_forest, random_forest_v2, logistic_regression]

    env:
      MLFLOW_TRACKING_URI: ${{ vars.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ vars.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Pull data with DVC
        run: |
          uv run dvc remote modify --local dagshub access_key_id ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          uv run dvc remote modify --local dagshub secret_access_key ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
          uv run dvc pull

      - name: Train model (${{ matrix.model_type }})
        run: uv run outlier_detector_training.py ${{ matrix.model_type }}

